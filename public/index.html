<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מערכת איסוף טלפונים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ===== BASE ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

/* ===== LOGIN ===== */
#loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 20px; }
.login-box { background: white; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
.login-box h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
.login-box p { color: #888; margin-bottom: 28px; font-size: 14px; }
.login-box input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; margin-bottom: 14px; direction: rtl; transition: border-color .2s; font-family: inherit; }
.login-box input:focus { outline: none; border-color: #0f3460; }
.btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #0f3460, #e94560); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s; font-family: inherit; }
.btn-primary:active { opacity: .85; }
#loginError { color: #e94560; font-size: 13px; margin-top: 10px; min-height: 18px; }

/* ===== TOPBAR ===== */
#app { display: none; min-height: 100vh; }
.topbar { background: #1a1a2e; color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.topbar-title { font-size: 16px; font-weight: 700; }
.topbar-user { display: flex; align-items: center; gap: 10px; }
.topbar-username { font-size: 13px; color: #aaa; }
.btn-logout { background: rgba(255,255,255,0.12); color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; white-space: nowrap; min-height: 36px; }
.btn-logout:active { background: rgba(255,255,255,0.25); }
.main-content { padding: 20px 16px; max-width: 1200px; margin: 0 auto; }

/* ===== STAT GRID ===== */
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: white; border-radius: 14px; padding: 18px 16px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
.stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 800; color: #1a1a2e; }
.stat-card .sub { font-size: 11px; color: #aaa; margin-top: 3px; }
.stat-card.green .value { color: #22c55e; }
.stat-card.orange .value { color: #f59e0b; }
.stat-card.red .value { color: #ef4444; }
.stat-card.blue .value { color: #3b82f6; }

/* ===== SECTION HEADER ===== */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.section-header h2 { font-size: 18px; font-weight: 700; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== BUTTONS ===== */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .15s; font-family: inherit; min-height: 42px; white-space: nowrap; }
.btn:active { opacity: .8; }
.btn-blue { background: #3b82f6; color: white; }
.btn-green { background: #22c55e; color: white; }
.btn-red { background: #ef4444; color: white; }
.btn-gray { background: #e5e7eb; color: #374151; }
.btn-orange { background: #f59e0b; color: white; }
.btn-sm { padding: 7px 12px; font-size: 13px; min-height: 36px; border-radius: 8px; }
.btn-icon { padding: 8px 10px; min-height: 36px; min-width: 36px; border-radius: 8px; }

/* ===== TABS ===== */
.tabs { display: flex; gap: 4px; background: white; padding: 5px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); margin-bottom: 20px; width: 100%; }
.tab { flex: 1; padding: 10px 14px; border-radius: 9px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: transparent; color: #64748b; transition: all .2s; font-family: inherit; text-align: center; min-height: 42px; }
.tab.active { background: #1a1a2e; color: white; }

/* ===== DESKTOP TABLE ===== */
.table-wrap { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 24px; }
table { width: 100%; border-collapse: collapse; }
th { background: #f8fafc; padding: 12px 16px; text-align: right; font-size: 12px; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }

/* ===== MOBILE CARDS (replaces table rows on small screens) ===== */
.user-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.user-card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
.user-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.user-card-name { font-size: 16px; font-weight: 700; }
.user-card-username { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.user-card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.user-card-stat { background: #f8fafc; border-radius: 8px; padding: 8px; text-align: center; }
.user-card-stat .cs-val { font-size: 20px; font-weight: 800; color: #1a1a2e; }
.user-card-stat .cs-lbl { font-size: 10px; color: #94a3b8; margin-top: 2px; }
.user-card-progress { margin-bottom: 14px; }
.user-card-progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.user-card-progress-label { font-size: 12px; color: #64748b; }
.user-card-progress-pct { font-size: 13px; font-weight: 700; color: #1a1a2e; }
.progress-bar-full { background: #e5e7eb; border-radius: 99px; height: 8px; width: 100%; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b82f6, #22c55e); transition: width .3s; }
.user-card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.user-card-actions .btn { flex: 1; min-width: 0; font-size: 13px; padding: 10px 8px; }

/* ===== PROGRESS (inline desktop) ===== */
.progress-bar { background: #e5e7eb; border-radius: 99px; height: 8px; width: 100px; overflow: hidden; display: inline-block; }

/* ===== BADGES ===== */
.badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
.badge-green { background: #dcfce7; color: #16a34a; }
.badge-orange { background: #fef3c7; color: #d97706; }
.badge-red { background: #fee2e2; color: #dc2626; }
.badge-gray { background: #f1f5f9; color: #64748b; }

/* ===== MODAL ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: flex-end; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; padding: 28px 20px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 -8px 40px rgba(0,0,0,.2); }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; margin-top: 14px; }
.modal input, .modal textarea { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; direction: rtl; font-family: inherit; transition: border-color .2s; }
.modal input:focus, .modal textarea:focus { outline: none; border-color: #3b82f6; }
.modal textarea { resize: vertical; min-height: 100px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
.modal-footer .btn { flex: 1; }

/* ===== PROFILE SUMMARY ===== */
.profile-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.summary-card { background: white; border-radius: 14px; padding: 16px 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); text-align: center; }
.summary-card .num { font-size: 30px; font-weight: 800; }
.summary-card .lbl { font-size: 11px; color: #888; margin-top: 3px; }
.summary-card.blue .num { color: #3b82f6; }
.summary-card.green .num { color: #22c55e; }
.summary-card.orange .num { color: #f59e0b; }

/* ===== NAMES TABLE ===== */
.names-table-wrap { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
.search-bar { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 10px; align-items: center; }
.search-bar input { flex: 1; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 9px; font-size: 15px; direction: rtl; font-family: inherit; }
.search-bar input:focus { outline: none; border-color: #3b82f6; }
.search-bar-count { font-size: 12px; color: #94a3b8; white-space: nowrap; }

/* Name rows */
.name-row { border-bottom: 1px solid #f1f5f9; padding: 12px 14px; }
.name-row:last-child { border-bottom: none; }
.name-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.name-row-label { font-size: 14px; font-weight: 600; }
.name-row-num { font-size: 11px; color: #94a3b8; }
.name-row-input-wrap { display: flex; gap: 8px; }
.phone-input { flex: 1; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 9px; font-size: 15px; font-family: inherit; direction: ltr; text-align: left; transition: border-color .2s; min-width: 0; }
.phone-input:focus { outline: none; border-color: #3b82f6; }
.save-btn { padding: 10px 16px; background: #3b82f6; color: white; border: none; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; white-space: nowrap; min-height: 44px; }
.save-btn:active { opacity: .8; }

/* Archive row */
.archive-row { border-bottom: 1px solid #f1f5f9; padding: 12px 14px; background: #f0fdf4; }
.archive-row:last-child { border-bottom: none; }
.archive-row-header { display: flex; align-items: center; justify-content: space-between; }
.archive-name { font-size: 14px; font-weight: 600; }
.archive-phone { font-size: 15px; font-weight: 700; color: #16a34a; direction: ltr; }
.archive-row-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.archive-date { font-size: 11px; color: #94a3b8; }

/* ===== UPLOAD ===== */
.upload-area { border: 2px dashed #d1d5db; border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .2s; color: #6b7280; font-size: 14px; margin-top: 8px; }
.upload-area:active { border-color: #3b82f6; }
.upload-area input { display: none; }

/* ===== SUPPORT BUTTONS ===== */
.support-btns { display: flex; gap: 8px; margin-top: 8px; }
.support-btn { flex: 1; padding: 9px 8px; border-radius: 9px; border: 2px solid #e5e7eb; background: #f8fafc; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; min-height: 40px; transition: all .15s; }
.support-btn:active { opacity: .75; }
.support-btn.active-green { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
.support-btn.active-red   { background: #fee2e2; border-color: #ef4444; color: #dc2626; }

/* ===== MISC ===== */
.inline-flex { display: flex; align-items: center; gap: 8px; }
.row-num { color: #94a3b8; font-size: 12px; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #e0e0e0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 15px; }
.empty { text-align: center; padding: 50px 20px; color: #aaa; }
.empty .icon { font-size: 44px; margin-bottom: 10px; }
.empty p { font-size: 14px; }

/* ===== DESKTOP OVERRIDES (≥768px) ===== */
@media (min-width: 768px) {
  .main-content { padding: 32px 28px; }
  .topbar { padding: 0 28px; height: 60px; }
  .topbar-title { font-size: 18px; }
  .stat-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
  .stat-card .value { font-size: 32px; }
  .tabs { width: fit-content; }
  .tab { flex: none; padding: 10px 22px; }
  .modal-overlay { align-items: center; }
  .modal { border-radius: 16px; padding: 32px; width: 520px; }
  .modal-footer .btn { flex: none; }
  .user-card-stats { grid-template-columns: repeat(6, 1fr); }
  .profile-summary { gap: 16px; }
  .summary-card { padding: 20px; }
  .summary-card .num { font-size: 36px; }
  .summary-card .lbl { font-size: 13px; }
}

/* ===== MOBILE ONLY (< 768px) ===== */
@media (max-width: 767px) {
  .section-header { flex-direction: column; align-items: flex-start; }
  .btn-group { width: 100%; }
  .btn-group .btn { flex: 1; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div style="font-size:44px;margin-bottom:10px;">📋</div>
    <h1>מערכת איסוף טלפונים</h1>
    <p>התחבר כדי להמשיך</p>
    <input type="text" id="loginUsername" placeholder="שם משתמש" autocomplete="off" autocapitalize="none">
    <input type="password" id="loginPassword" placeholder="סיסמה">
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">כניסה</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">📋 מערכת איסוף טלפונים</div>
    <div class="topbar-user">
      <span class="topbar-username" id="topbarUserLabel"></span>
      <button class="btn-logout" onclick="doLogout()">התנתק</button>
    </div>
  </div>
  <div class="main-content" id="mainContent">
    <div class="loading-overlay"><div class="spinner" style="width:32px;height:32px;margin:0 auto 12px;"></div><div>טוען...</div></div>
  </div>
</div>

<!-- MODAL EXPORT -->
<div class="modal-overlay" id="modalExportOptions">
  <div class="modal">
    <h3>📊 ייצוא לפי משתמש</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:16px;">בחר משתמש לייצוא לאקסל</p>
    <div id="exportUsersList"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalExportOptions')">סגור</button>
      <button class="btn btn-green" onclick="exportAllExcel()">📥 ייצא הכל</button>
    </div>
  </div>
</div>

<!-- MODAL ADD USER -->
<div class="modal-overlay" id="modalAddUser">
  <div class="modal">
    <h3>➕ הוסף משתמש</h3>
    <label>שם משתמש</label>
    <input type="text" id="newUsername" placeholder="לדוגמה: yossi123" autocapitalize="none">
    <label>סיסמה</label>
    <input type="password" id="newPassword" placeholder="לפחות 4 תווים">
    <label>שם תצוגה</label>
    <input type="text" id="newDisplayName" placeholder="יוסי לוי">
    <label>טלפון לוואטסאפ</label>
    <input type="tel" id="newPhone" placeholder="050-1234567" style="direction:ltr;text-align:right;">
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalAddUser')">ביטול</button>
      <button class="btn btn-blue" onclick="saveNewUser()">שמור</button>
    </div>
  </div>
</div>

<!-- MODAL EDIT USER -->
<div class="modal-overlay" id="modalEditUser">
  <div class="modal">
    <h3>⚙️ עריכת משתמש</h3>
    <label>שם תצוגה</label>
    <input type="text" id="editDisplayName">
    <label>טלפון לוואטסאפ</label>
    <input type="tel" id="editPhone" style="direction:ltr;text-align:right;">
    <label>סיסמה חדשה <span style="font-weight:normal;color:#94a3b8;">(ריק = ללא שינוי)</span></label>
    <input type="password" id="editPassword" placeholder="לפחות 4 תווים">
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalEditUser')">ביטול</button>
      <button class="btn btn-blue" onclick="saveEditUser()">שמור</button>
    </div>
  </div>
</div>

<!-- MODAL ADD NAMES -->
<div class="modal-overlay" id="modalAddNames">
  <div class="modal">
    <h3>📝 הוסף שמות</h3>
    <div id="modalAddNamesUserLabel" style="color:#64748b;font-size:13px;margin-bottom:14px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button class="btn btn-blue btn-sm" onclick="setNamesMode('manual')" id="tabManual" style="flex:1;">ידני</button>
      <button class="btn btn-gray btn-sm" onclick="setNamesMode('excel')" id="tabExcel" style="flex:1;">העלאת אקסל</button>
    </div>
    <div id="namesManualArea">
      <label>שמות — שורה אחת לכל שם</label>
      <textarea id="namesTextarea" placeholder="ישראל ישראלי&#10;שרה כהן&#10;משה לוי" style="font-size:15px;"></textarea>
    </div>
    <div id="namesExcelArea" style="display:none;">
      <label>קובץ אקסל (.xlsx / .csv)</label>
      <div class="upload-area" onclick="document.getElementById('excelFileInput').click()">
        <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" onchange="handleExcelUpload(event)">
        <div style="font-size:30px;">📂</div>
        <div style="margin-top:6px;">לחץ לבחירת קובץ</div>
      </div>
      <div id="excelPreview" style="margin-top:10px;"></div>
    </div>
    <div style="margin-top:12px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal;">
        <input type="checkbox" id="replaceNames" style="width:auto;width:18px;height:18px;">
        <span style="font-size:13px;color:#64748b;">החלף רשימה קיימת</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalAddNames')">ביטול</button>
      <button class="btn btn-green" onclick="saveNames()">שמור שמות</button>
    </div>
  </div>
</div>

<!-- MODAL USER DETAIL -->
<div class="modal-overlay" id="modalUserDetail">
  <div class="modal" style="max-width:680px;">
    <h3 id="userDetailTitle">פרטי משתמש</h3>
    <div id="userDetailContent"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalUserDetail')">סגור</button>
    </div>
  </div>
</div>

<script>
// ===== API =====
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'}, credentials: 'same-origin' };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res  = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'שגיאה בשרת');
  return data;
}
const GET  = p     => api('GET',    p);
const POST = (p,b) => api('POST',   p, b);
const PUT  = (p,b) => api('PUT',    p, b);
const DEL  = p     => api('DELETE', p);
const loading = () => `<div class="loading-overlay"><div class="spinner" style="width:32px;height:32px;margin:0 auto 12px;"></div><div>טוען...</div></div>`;
const esc = s => String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');

// ===== AUTH =====
let currentUser = null;

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  document.getElementById('loginError').textContent = '';
  btn.textContent = '...'; btn.disabled = true;
  try {
    currentUser = await POST('/api/login', { username, password });
    showApp();
  } catch(e) {
    document.getElementById('loginError').textContent = e.message;
  } finally { btn.textContent = 'כניסה'; btn.disabled = false; }
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbarUserLabel').textContent = currentUser.displayName || currentUser.username;
  renderApp();
}

async function doLogout() {
  await POST('/api/logout');
  currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('loginPage').style.display!=='none') doLogin();
});

function renderApp() {
  if (currentUser.role === 'admin') renderAdmin();
  else renderUserProfile(currentUser.id);
}

// ===== ADMIN =====
let adminTab = 'overview';

async function renderAdmin() {
  const content = document.getElementById('mainContent');
  content.innerHTML = loading();
  try {
    const [stats, users] = await Promise.all([
      GET('/api/stats'),
      adminTab === 'users' ? GET('/api/users') : Promise.resolve([])
    ]);
    const total  = stats.reduce((s,u)=>s+u.total,0);
    const phones = stats.reduce((s,u)=>s+u.collected,0);

    content.innerHTML = `
      <div class="tabs">
        <button class="tab ${adminTab==='overview'?'active':''}" onclick="switchTab('overview')">סקירה כללית</button>

          <div class="btn-group">
            <button class="btn btn-green btn-sm" onclick="exportAllExcel()">📥 ייצא הכל</button>
            <button class="btn btn-gray btn-sm" onclick="openExportOptions()">📊 ייצוא לפי משתמש</button>

        ${renderStatsCards(stats)}

          <h2>ניהול משתמשים</h2>

        </div>

  } catch(e) {
    content.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>שגיאה: ${e.message}</p></div>`;
  }
}

let currentNamesUserId=null, currentNamesMode='manual', parsedExcelNames=[];
function openAddNames(userId, displayName) {
  currentNamesUserId = userId;
  document.getElementById('modalAddNamesUserLabel').textContent = `משתמש: ${displayName}`;
  document.getElementById('namesTextarea').value = '';
  document.getElementById('excelPreview').innerHTML = '';
  document.getElementById('replaceNames').checked = false;
  document.getElementById('excelFileInput').value = '';
  parsedExcelNames = [];
  setNamesMode('manual');
  openModal('modalAddNames');
}
function setNamesMode(mode) {
  currentNamesMode = mode;
  document.getElementById('namesManualArea').style.display  = mode==='manual'?'block':'none';
  document.getElementById('namesExcelArea').style.display   = mode==='excel'?'block':'none';
  document.getElementById('tabManual').className = 'btn btn-sm '+(mode==='manual'?'btn-blue':'btn-gray');
  document.getElementById('tabExcel').className  = 'btn btn-sm '+(mode==='excel'?'btn-blue':'btn-gray');
  document.getElementById('tabManual').style.flex = '1';
  document.getElementById('tabExcel').style.flex  = '1';
}
function handleExcelUpload(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
      parsedExcelNames = rows.map(r=>String(r[0]||'').trim()).filter(v=>v.length>1);
      document.getElementById('excelPreview').innerHTML = `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:13px;color:#16a34a;">✅ נמצאו <strong>${parsedExcelNames.length}</strong> שמות<div style="max-height:70px;overflow-y:auto;margin-top:6px;color:#374151;">${parsedExcelNames.slice(0,5).join(' | ')}${parsedExcelNames.length>5?' ...':''}</div></div>`;
    } catch { document.getElementById('excelPreview').innerHTML='<div style="color:#ef4444;font-size:13px;">שגיאה בקריאת הקובץ</div>'; }
  };
  reader.readAsArrayBuffer(file);
}
async function saveNames() {
  const names = currentNamesMode==='manual'
    ? document.getElementById('namesTextarea').value.split('\n').map(s=>s.trim()).filter(Boolean)
    : parsedExcelNames;
  if (!names.length) { alert('לא הוזנו שמות'); return; }
  const replace = document.getElementById('replaceNames').checked;
  try {
    const res = await POST('/api/names', {userId: currentNamesUserId, names, replace});
    closeModal('modalAddNames');
    alert(`נוספו ${res.added} שמות חדשים`);
    renderAdmin();
  } catch(e) { alert(e.message); }
}

let profileTab='pending', phoneFilter='', profileNames=[];

async function renderUserProfile(userId) {
  document.getElementById('mainContent').innerHTML = loading();

    profileNames = await GET(`/api/names?userId=${userId}`);
    renderProfileView(userId);
  } catch(e) {

function renderProfileView(userId) {
  const user     = currentUser;
  const today    = new Date().toDateString();
  const pending  = profileNames.filter(n=>!n.phone);
  const archived = profileNames.filter(n=> n.phone);
  const todayC   = archived.filter(n=>new Date(n.phoneAddedAt).toDateString()===today).length;
  const pct      = profileNames.length ? Math.round(archived.length/profileNames.length*100) : 0;
  const list     = profileTab==='pending' ? pending : archived;
  const filtered = list.filter(n=>!phoneFilter||n.name.includes(phoneFilter));

  document.getElementById('mainContent').innerHTML = `
    <div style="margin-bottom:16px;">
      <h1 style="font-size:20px;font-weight:800;">${user.displayName||user.username}</h1>
      <div style="font-size:12px;color:#94a3b8;">רשימת שמות לאיסוף טלפונים</div>
    </div>

    <div class="profile-summary">
      <div class="summary-card blue"><div class="num">${todayC}</div><div class="lbl">היום</div></div>
      <div class="summary-card green">
        <div class="num">${pct}%</div><div class="lbl">הושלמו</div>
        <div style="margin-top:6px;"><div class="progress-bar-full"><div class="progress-fill" style="width:${pct}%"></div></div></div>
      </div>
      <div class="summary-card orange"><div class="num">${pending.length}</div><div class="lbl">נשאר</div></div>
    </div>

    <div class="tabs">
      <button class="tab ${profileTab==='pending'?'active':''}" onclick="switchProfileTab('pending','${userId}')">
        ⏳ ממתינים (${pending.length})
      </button>
      <button class="tab ${profileTab==='archive'?'active':''}" onclick="switchProfileTab('archive','${userId}')">
        ✅ ארכיון (${archived.length})
      </button>
    </div>

    <div class="names-table-wrap">
      <div class="search-bar">
        <input type="text" placeholder="🔍 חיפוש שם..." value="${phoneFilter}" oninput="phoneFilter=this.value;renderProfileView('${userId}')">
        <span class="search-bar-count">${filtered.length} שמות</span>
      </div>
      ${filtered.length===0
        ? `<div class="empty"><div class="icon">${profileTab==='pending'?'🎉':'📦'}</div><p>${
            profileNames.length===0?'אין שמות ברשימה עדיין':
            profileTab==='pending'?'כל השמות הושלמו! 🎉':'אין עדיין שמות עם טלפון'
          }</p></div>`
        : profileTab==='pending'
          ? filtered.map(n => {
              const orig = profileNames.indexOf(n)+1;
              const ss = n.supportStatus;
              return `<div class="name-row">
                <div class="name-row-top">
                  <span class="name-row-label">${n.name}</span>
                  <span class="name-row-num">#${orig}</span>
                </div>
                <div class="name-row-input-wrap">
                  <input type="tel" class="phone-input" id="ph_${n.id}" placeholder="05X-XXXXXXX"
                    onkeydown="if(event.key==='Enter')savePhone('${userId}','${n.id}')">
                  <button class="save-btn" onclick="savePhone('${userId}','${n.id}')">שמור</button>
                </div>
                <div class="support-btns">
                  <button class="support-btn ${ss==='supporter'?'active-green':''}" onclick="setSupport('${userId}','${n.id}','supporter')">✅ תומך</button>
                  <button class="support-btn ${ss==='not_supporter'?'active-red':''}" onclick="setSupport('${userId}','${n.id}','not_supporter')">❌ לא תומך</button>
                </div>
              </div>`;
            }).join('')
          : filtered.map(n => {
              const orig = profileNames.indexOf(n)+1;
              const d = n.phoneAddedAt ? new Date(n.phoneAddedAt).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
              const ss = n.supportStatus;
              const supportBadge = ss==='supporter'
                ? '<span class="badge badge-green">✅ תומך</span>'
                : ss==='not_supporter'
                ? '<span class="badge badge-red">❌ לא תומך</span>'
                : '<span class="badge badge-gray">לא סומן</span>';
              return `<div class="archive-row">
                <div class="archive-row-header">
                  <span class="archive-name">${n.name}</span>
                  <span class="archive-phone">${n.phone}</span>
                </div>
                <div class="archive-row-footer">
                  <span class="archive-date">${d}</span>
                  <div style="display:flex;gap:6px;align-items:center;">
                    ${supportBadge}
                    <button class="btn btn-sm btn-gray" onclick="clearPhone('${userId}','${n.id}')">↩</button>

                </div>

                  <button class="support-btn ${ss==='not_supporter'?'active-red':''}" onclick="setSupport('${userId}','${n.id}','not_supporter')">❌ לא תומך</button>
                </div>
              </div>`;
            }).join('')
      }
    </div>`;
}

function switchProfileTab(tab,userId) { profileTab=tab; phoneFilter=''; renderProfileView(userId); }

async function savePhone(userId, nameId) {
  const input = document.getElementById('ph_'+nameId);
  const phone = input ? input.value.trim() : '';
  if (!phone) { alert('יש להזין מספר טלפון'); return; }
  try {
    await PUT(`/api/names/${nameId}`, {phone});
    profileNames = await GET(`/api/names?userId=${userId}`);
    renderProfileView(userId);
  } catch(e) { alert(e.message); }
}
async function clearPhone(userId, nameId) {
  try {
    await PUT(`/api/names/${nameId}`, {phone:''});
    profileNames = await GET(`/api/names?userId=${userId}`);
    renderProfileView(userId);
  } catch(e) { alert(e.message); }
}
async function setSupport(userId, nameId, status) {
  const n = profileNames.find(x=>x.id===nameId);
  const newStatus = n && n.supportStatus === status ? '' : status;
  try {
    await PUT(`/api/names/${nameId}`, {supportStatus: newStatus});
    profileNames = await GET(`/api/names?userId=${userId}`);
    renderProfileView(userId);
  } catch(e) { alert(e.message); }
}

// ===== EXCEL EXPORT =====
async function exportAllExcel() {
  try {
    const rows = await GET('/api/export/all');
    if (!rows.length) { alert('אין טלפונים שנאספו עדיין'); return; }
    const sup = s => s==='supporter'?'✅ תומך':s==='not_supporter'?'❌ לא תומך':'—';
    const data = [['שם','טלפון','תמיכה','משתמש','תאריך הזנה'],
      ...rows.map(r=>[r.name, r.phone, sup(r.support), r.user, r.date?new Date(r.date).toLocaleDateString('he-IL'):''])];
    dlExcel(data, 'כל_הטלפונים');
  } catch(e) { alert(e.message); }
}
async function exportUserExcel(userId, displayName) {
  try {
    const rows = await GET(`/api/export/user/${userId}`);
    if (!rows.length) { alert('אין טלפונים שנאספו עבור משתמש זה'); return; }
    const sup = s => s==='supporter'?'✅ תומך':s==='not_supporter'?'❌ לא תומך':'—';
    const data = [['שם','טלפון','תמיכה','תאריך הזנה'],
      ...rows.map(r=>[r.name, r.phone, sup(r.support), r.date?new Date(r.date).toLocaleDateString('he-IL'):''])];
    dlExcel(data, `טלפונים_${displayName||userId}`);
  } catch(e) { alert(e.message); }
}
function dlExcel(rows, filename) {
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:16},{wch:18},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'טלפונים');
  XLSX.writeFile(wb, `${filename}_${new Date().toLocaleDateString('he-IL').replace(/\./g,'-')}.xlsx`);
}
async function openExportOptions() {
  const stats = await GET('/api/stats');
  document.getElementById('exportUsersList').innerHTML = stats.map(u=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;gap:10px;">
      <div><strong style="font-size:14px;">${u.displayName}</strong>
        <span style="font-size:12px;color:#94a3b8;margin-right:6px;">${u.collected} טלפונים</span></div>
      <button class="btn btn-sm btn-green" ${!u.collected?'disabled style="opacity:.4;"':''} onclick="exportUserExcel('${u.userId}','${esc(u.displayName)}')">📥 ייצא</button>
    </div>`).join('')||'<div style="text-align:center;color:#aaa;padding:20px;">אין משתמשים</div>';
  openModal('modalExportOptions');
}

// ===== WHATSAPP =====
function sendWhatsApp(phone, displayName, pct) {
  const name = displayName.split(' ')[0];
  const msg  = pct>=50
    ? `שלום ${name}! 🌟\nוואו, איזה ביצועים מדהימים!\nהגעת כבר ל-${pct}% מהיעד שלך — זה ממש מרשים! 💪`
    : `שלום ${name}, מה שלומך? 😊\nראיתי שהיום עוד לא הגעת ליעד שלך...\nאתה עומד על ${pct}% בלבד — יש עוד מה להשלים.\nאני בטוח שאתה יכול לסגור את הפער! 💪`;
  const cleaned = phone.replace(/[-\s()]/g,'');
  const intl    = cleaned.startsWith('0') ? '972'+cleaned.slice(1) : cleaned;
  window.open(`https://wa.me/${intl}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ===== MODALS =====
function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(m =>
  m.addEventListener('click', e => { if (e.target===m) m.classList.remove('active'); })
);
