<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת איסוף טלפונים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

  #loginPage {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }
  .login-box {
    background: white; border-radius: 16px; padding: 48px 40px;
    width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
  }
  .login-box h1 { font-size: 26px; margin-bottom: 8px; color: #1a1a2e; }
  .login-box p { color: #888; margin-bottom: 32px; font-size: 14px; }
  .login-box input {
    width: 100%; padding: 13px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 15px; margin-bottom: 16px; direction: rtl; transition: border-color .2s; font-family: inherit;
  }
  .login-box input:focus { outline: none; border-color: #0f3460; }
  .btn-primary {
    width: 100%; padding: 13px; background: linear-gradient(135deg, #0f3460, #e94560);
    color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: opacity .2s; font-family: inherit;
  }
  .btn-primary:hover { opacity: .88; }
  #loginError { color: #e94560; font-size: 13px; margin-top: 12px; min-height: 18px; }

  #app { display: none; min-height: 100vh; }
  .topbar {
    background: #1a1a2e; color: white; padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-title { font-size: 18px; font-weight: 700; }
  .topbar-user { display: flex; align-items: center; gap: 14px; }
  .topbar-user span { font-size: 14px; color: #aaa; }
  .btn-logout {
    background: rgba(255,255,255,0.1); color: white; border: none;
    padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: background .2s; font-family: inherit;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }
  .main-content { padding: 32px 28px; max-width: 1200px; margin: 0 auto; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: white; border-radius: 14px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
  .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .stat-card .value { font-size: 32px; font-weight: 800; color: #1a1a2e; }
  .stat-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
  .stat-card.green .value { color: #22c55e; }
  .stat-card.orange .value { color: #f59e0b; }
  .stat-card.red .value { color: #ef4444; }
  .stat-card.blue .value { color: #3b82f6; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-header h2 { font-size: 20px; font-weight: 700; }

  .btn { padding: 9px 18px; border-radius: 9px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .2s; font-family: inherit; }
  .btn:hover { opacity: .85; }
  .btn-blue { background: #3b82f6; color: white; }
  .btn-green { background: #22c55e; color: white; }
  .btn-red { background: #ef4444; color: white; }
  .btn-gray { background: #e5e7eb; color: #374151; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .table-wrap { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8fafc; padding: 14px 18px; text-align: right; font-size: 13px; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
  td { padding: 14px 18px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }

  .progress-bar { background: #e5e7eb; border-radius: 99px; height: 8px; width: 120px; overflow: hidden; display: inline-block; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b82f6, #22c55e); transition: width .3s; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #dcfce7; color: #16a34a; }
  .badge-orange { background: #fef3c7; color: #d97706; }
  .badge-red { background: #fee2e2; color: #dc2626; }
  .badge-gray { background: #f1f5f9; color: #64748b; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 32px; width: 520px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  .modal label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; margin-top: 14px; }
  .modal input, .modal textarea { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 9px; font-size: 14px; direction: rtl; font-family: inherit; transition: border-color .2s; }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: #3b82f6; }
  .modal textarea { resize: vertical; min-height: 100px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  .profile-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .summary-card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.07); text-align: center; }
  .summary-card .num { font-size: 36px; font-weight: 800; }
  .summary-card .lbl { font-size: 13px; color: #888; margin-top: 4px; }
  .summary-card.blue .num { color: #3b82f6; }
  .summary-card.green .num { color: #22c55e; }
  .summary-card.orange .num { color: #f59e0b; }

  .names-table-wrap { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
  .names-table-wrap .search-bar { padding: 16px 18px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 12px; align-items: center; }
  .names-table-wrap .search-bar input { flex: 1; padding: 9px 14px; border: 2px solid #e0e0e0; border-radius: 9px; font-size: 14px; direction: rtl; font-family: inherit; }
  .names-table-wrap .search-bar input:focus { outline: none; border-color: #3b82f6; }

  .phone-input { padding: 7px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; width: 160px; font-family: inherit; direction: ltr; text-align: left; transition: border-color .2s; }
  .phone-input:focus { outline: none; border-color: #3b82f6; }
  .save-btn { padding: 7px 14px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity .2s; font-family: inherit; }
  .save-btn:hover { opacity: .85; }

  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: white; padding: 6px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); width: fit-content; }
  .tab { padding: 10px 22px; border-radius: 9px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: transparent; color: #64748b; transition: all .2s; font-family: inherit; }
  .tab.active { background: #1a1a2e; color: white; }

  .empty { text-align: center; padding: 60px 20px; color: #aaa; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  .upload-area { border: 2px dashed #d1d5db; border-radius: 10px; padding: 28px; text-align: center; cursor: pointer; transition: border-color .2s; color: #6b7280; font-size: 14px; margin-top: 8px; }
  .upload-area:hover { border-color: #3b82f6; color: #3b82f6; }
  .upload-area input { display: none; }

  .inline-flex { display: flex; align-items: center; gap: 8px; }
  .row-num { color: #94a3b8; font-size: 12px; }

  .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #e0e0e0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay { text-align: center; padding: 80px; color: #94a3b8; font-size: 15px; }

  @media (max-width: 600px) {
    .profile-summary { grid-template-columns: 1fr 1fr; }
    .main-content { padding: 20px 14px; }
    .topbar { padding: 0 14px; }
    .modal { padding: 24px 18px; }
  }
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <div style="font-size:48px;margin-bottom:12px;">📋</div>
    <h1>מערכת איסוף טלפונים</h1>
    <p>התחבר כדי להמשיך</p>
    <input type="text" id="loginUsername" placeholder="שם משתמש" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="סיסמה">
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">כניסה</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">📋 מערכת איסוף טלפונים</div>
    <div class="topbar-user">
      <span id="topbarUserLabel"></span>
      <button class="btn-logout" onclick="doLogout()">התנתק</button>
    </div>
  </div>
  <div class="main-content" id="mainContent">
    <div class="loading-overlay"><div class="spinner" style="width:32px;height:32px;margin:0 auto 12px;"></div><div>טוען...</div></div>
  </div>
</div>

<!-- MODAL EXPORT OPTIONS -->
<div class="modal-overlay" id="modalExportOptions">
  <div class="modal">
    <h3>📊 ייצוא לפי משתמש</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:20px;">בחר משתמש לייצוא הטלפונים שלו לאקסל</p>
    <div id="exportUsersList"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalExportOptions')">סגור</button>
      <button class="btn btn-green" onclick="exportAllExcel()">📥 ייצא את כולם יחד</button>
    </div>
  </div>
</div>

<!-- MODAL ADD USER -->
<div class="modal-overlay" id="modalAddUser">
  <div class="modal">
    <h3>➕ הוסף משתמש חדש</h3>
    <label>שם משתמש</label>
    <input type="text" id="newUsername" placeholder="לדוגמה: yossi123">
    <label>סיסמה</label>
    <input type="password" id="newPassword" placeholder="לפחות 4 תווים">
    <label>שם תצוגה</label>
    <input type="text" id="newDisplayName" placeholder="לדוגמה: יוסי לוי">
    <label>מספר טלפון (לוואטסאפ)</label>
    <input type="tel" id="newPhone" placeholder="050-1234567" style="direction:ltr;text-align:right;">
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalAddUser')">ביטול</button>
      <button class="btn btn-blue" onclick="saveNewUser()">שמור</button>
    </div>
  </div>
</div>

<!-- MODAL EDIT USER -->
<div class="modal-overlay" id="modalEditUser">
  <div class="modal">
    <h3>⚙️ עריכת משתמש</h3>
    <label>שם תצוגה</label>
    <input type="text" id="editDisplayName" placeholder="שם מלא">
    <label>טלפון (לוואטסאפ)</label>
    <input type="tel" id="editPhone" placeholder="050-1234567" style="direction:ltr;text-align:right;">
    <label>סיסמה חדשה <span style="font-weight:normal;color:#94a3b8;">(השאר ריק לאי-שינוי)</span></label>
    <input type="password" id="editPassword" placeholder="לפחות 4 תווים">
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalEditUser')">ביטול</button>
      <button class="btn btn-blue" onclick="saveEditUser()">שמור</button>
    </div>
  </div>
</div>

<!-- MODAL ADD NAMES -->
<div class="modal-overlay" id="modalAddNames">
  <div class="modal">
    <h3>📝 הוסף שמות למשתמש</h3>
    <div id="modalAddNamesUserLabel" style="color:#64748b;font-size:14px;margin-bottom:16px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn btn-blue btn-sm" onclick="setNamesMode('manual')" id="tabManual">ידני</button>
      <button class="btn btn-gray btn-sm" onclick="setNamesMode('excel')" id="tabExcel">העלאת אקסל</button>
    </div>
    <div id="namesManualArea">
      <label>שמות (שורה אחת לכל שם)</label>
      <textarea id="namesTextarea" placeholder="ישראל ישראלי&#10;שרה כהן&#10;משה לוי"></textarea>
    </div>
    <div id="namesExcelArea" style="display:none;">
      <label>בחר קובץ אקסל (.xlsx / .csv)</label>
      <div class="upload-area" onclick="document.getElementById('excelFileInput').click()">
        <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" onchange="handleExcelUpload(event)">
        <div style="font-size:32px;">📂</div>
        <div style="margin-top:8px;">לחץ לבחירת קובץ</div>
        <div style="font-size:12px;margin-top:4px;color:#9ca3af;">קובץ אקסל עם עמודה של שמות</div>
      </div>
      <div id="excelPreview" style="margin-top:12px;"></div>
    </div>
    <div style="margin-top:12px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal;">
        <input type="checkbox" id="replaceNames" style="width:auto;">
        <span style="font-size:13px;color:#64748b;">החלף את הרשימה הקיימת</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalAddNames')">ביטול</button>
      <button class="btn btn-green" onclick="saveNames()">שמור שמות</button>
    </div>
  </div>
</div>

<!-- MODAL USER DETAIL -->
<div class="modal-overlay" id="modalUserDetail">
  <div class="modal" style="width:700px;">
    <h3 id="userDetailTitle">פרטי משתמש</h3>
    <div id="userDetailContent"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalUserDetail')">סגור</button>
    </div>
  </div>
</div>

<script>
// ===================== API =====================
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'}, credentials: 'same-origin' };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res  = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'שגיאה בשרת');
  return data;
}
const GET  = p    => api('GET',    p);
const POST = (p,b)=> api('POST',   p, b);
const PUT  = (p,b)=> api('PUT',    p, b);
const DEL  = p    => api('DELETE', p);

function loading() {
  return `<div class="loading-overlay"><div class="spinner" style="width:32px;height:32px;margin:0 auto 12px;"></div><div>טוען...</div></div>`;
}

// ===================== AUTH =====================
let currentUser = null;

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  document.getElementById('loginError').textContent = '';
  btn.textContent = '...'; btn.disabled = true;
  try {
    currentUser = await POST('/api/login', { username, password });
    showApp();
  } catch(e) {
    document.getElementById('loginError').textContent = e.message;
  } finally {
    btn.textContent = 'כניסה'; btn.disabled = false;
  }
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbarUserLabel').textContent = currentUser.displayName || currentUser.username;
  renderApp();
}

async function doLogout() {
  await POST('/api/logout');
  currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') doLogin();
});

function renderApp() {
  if (currentUser.role === 'admin') renderAdmin();
  else renderUserProfile(currentUser.id);
}

// ===================== ADMIN =====================
let adminTab = 'overview';

async function renderAdmin() {
  const content = document.getElementById('mainContent');
  content.innerHTML = loading();
  try {
    const [stats, users] = await Promise.all([
      GET('/api/stats'),
      adminTab === 'users' ? GET('/api/users') : Promise.resolve([])
    ]);
    const total   = stats.reduce((s,u) => s+u.total, 0);
    const phones  = stats.reduce((s,u) => s+u.collected, 0);
    const today   = stats.reduce((s,u) => s+u.today, 0);
    const pct     = total ? Math.round(phones/total*100) : 0;

    content.innerHTML = `
      <div class="tabs">
        <button class="tab ${adminTab==='overview'?'active':''}" onclick="switchTab('overview')">סקירה כללית</button>
        <button class="tab ${adminTab==='users'?'active':''}" onclick="switchTab('users')">משתמשים</button>
      </div>
      ${adminTab === 'overview' ? `
        <div class="stat-grid">
          <div class="stat-card blue"><div class="label">סה"כ שמות ברשימות</div><div class="value">${total}</div></div>
          <div class="stat-card green"><div class="label">טלפונים שנאספו</div><div class="value">${phones}</div><div class="sub">${pct}% הושלמו</div></div>
          <div class="stat-card orange"><div class="label">נאספו היום</div><div class="value">${today}</div></div>
          <div class="stat-card red"><div class="label">עוד נשאר לאסוף</div><div class="value">${total-phones}</div></div>
        </div>
        <div class="section-header">
          <h2>ביצועי משתמשים</h2>
          <div class="inline-flex" style="gap:8px;">
            <button class="btn btn-green" onclick="exportAllExcel()">📥 ייצא הכל לאקסל</button>
            <button class="btn btn-gray" onclick="openExportOptions()">📊 ייצוא לפי משתמש</button>
          </div>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>#</th><th>משתמש</th><th>שמות</th><th>אספו</th><th>היום</th><th>נשאר</th><th>התקדמות</th><th>דירוג</th><th>פעולות</th></tr></thead>
          <tbody>${renderStatsRows(stats)}</tbody>
        </table></div>
      ` : `
        <div class="section-header">
          <h2>ניהול משתמשים</h2>
          <button class="btn btn-blue" onclick="openModal('modalAddUser')">➕ הוסף משתמש</button>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>שם תצוגה</th><th>שם משתמש</th><th>טלפון</th><th>פעולות</th></tr></thead>
          <tbody>${renderUsersRows(users)}</tbody>
        </table></div>
      `}`;
  } catch(e) {
    content.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>שגיאה: ${e.message}</p></div>`;
  }
}

function renderStatsRows(stats) {
  if (!stats.length) return '<tr><td colspan="9"><div class="empty"><div class="icon">👥</div><p>אין משתמשים עדיין</p></div></td></tr>';
  return stats.map((u,i) => {
    const badge = !u.total ? '<span class="badge badge-gray">ללא רשימה</span>'
      : u.pct>=80 ? '<span class="badge badge-green">חזק 💪</span>'
      : u.pct>=40 ? '<span class="badge badge-orange">בינוני</span>'
      : '<span class="badge badge-red">חלש</span>';
    return `<tr>
      <td class="row-num">${i+1}</td>
      <td><strong>${u.displayName}</strong><br><span style="color:#94a3b8;font-size:12px;">${u.username}</span></td>
      <td>${u.total}</td><td><strong>${u.collected}</strong></td><td>${u.today}</td><td>${u.remaining}</td>
      <td><div class="inline-flex"><div class="progress-bar"><div class="progress-fill" style="width:${u.pct}%"></div></div><span style="font-size:12px;color:#64748b;">${u.pct}%</span></div></td>
      <td>${badge}</td>
      <td><div class="inline-flex" style="flex-wrap:wrap;gap:5px;">
        <button class="btn btn-sm btn-gray" onclick="openAddNames('${u.userId}','${esc(u.displayName)}')">✏️ שמות</button>
        <button class="btn btn-sm btn-blue" onclick="openUserDetail('${u.userId}')">👁</button>
        <button class="btn btn-sm btn-green" onclick="exportUserExcel('${u.userId}','${esc(u.displayName)}')">📥</button>
        ${u.phone?`<button class="btn btn-sm" style="background:${u.pct>=50?'#22c55e':'#f59e0b'};color:white;" onclick="sendWhatsApp('${u.phone}','${esc(u.displayName)}',${u.pct})">💬</button>`:''}
      </div></td>
    </tr>`;
  }).join('');
}

function renderUsersRows(users) {
  if (!users.length) return '<tr><td colspan="4"><div class="empty"><div class="icon">👥</div><p>אין משתמשים. לחץ "הוסף משתמש"</p></div></td></tr>';
  return users.map(u => `<tr>
    <td><strong>${u.displayName}</strong></td>
    <td style="direction:ltr;text-align:right;">${u.username}</td>
    <td style="direction:ltr;text-align:right;color:#64748b;">${u.phone||'<span style="color:#d1d5db;">—</span>'}</td>
    <td><div class="inline-flex" style="flex-wrap:wrap;gap:6px;">
      <button class="btn btn-sm btn-gray" onclick="openAddNames('${u.id}','${esc(u.displayName)}')">✏️ שמות</button>
      <button class="btn btn-sm btn-blue" onclick="openEditUser('${u.id}','${esc(u.displayName)}','${esc(u.phone||'')}')">⚙️ ערוך</button>
      <button class="btn btn-sm btn-red" onclick="deleteUser('${u.id}')">🗑</button>
    </div></td>
  </tr>`).join('');
}

function switchTab(tab) { adminTab = tab; renderAdmin(); }

// ===================== ADD USER =====================
async function saveNewUser() {
  const username    = document.getElementById('newUsername').value.trim();
  const password    = document.getElementById('newPassword').value;
  const displayName = document.getElementById('newDisplayName').value.trim();
  const phone       = document.getElementById('newPhone').value.trim();
  if (!username || !password) { alert('יש למלא שם משתמש וסיסמה'); return; }
  try {
    await POST('/api/users', { username, password, displayName, phone });
    closeModal('modalAddUser');
    ['newUsername','newPassword','newDisplayName','newPhone'].forEach(id => document.getElementById(id).value='');
    renderAdmin();
  } catch(e) { alert(e.message); }
}

async function deleteUser(uid) {
  if (!confirm('למחוק משתמש זה ואת כל הנתונים שלו?')) return;
  try { await DEL(`/api/users/${uid}`); renderAdmin(); } catch(e) { alert(e.message); }
}

// ===================== EDIT USER =====================
let editUserId = null;
function openEditUser(uid, displayName, phone) {
  editUserId = uid;
  document.getElementById('editDisplayName').value = displayName;
  document.getElementById('editPhone').value = phone;
  document.getElementById('editPassword').value = '';
  openModal('modalEditUser');
}
async function saveEditUser() {
  const displayName = document.getElementById('editDisplayName').value.trim();
  const phone       = document.getElementById('editPhone').value.trim();
  const password    = document.getElementById('editPassword').value;
  try {
    await PUT(`/api/users/${editUserId}`, { displayName, phone, ...(password ? {password} : {}) });

}

// ===================== ADD NAMES =====================
let currentNamesUserId = null, currentNamesMode = 'manual', parsedExcelNames = [];

function openAddNames(userId, displayName) {
  currentNamesUserId = userId;
  document.getElementById('modalAddNamesUserLabel').textContent = `משתמש: ${displayName}`;
  document.getElementById('namesTextarea').value = '';
  document.getElementById('excelPreview').innerHTML = '';
  document.getElementById('replaceNames').checked = false;
  document.getElementById('excelFileInput').value = '';
  parsedExcelNames = [];
  setNamesMode('manual');
  openModal('modalAddNames');
}
function setNamesMode(mode) {
  currentNamesMode = mode;
  document.getElementById('namesManualArea').style.display = mode==='manual'?'block':'none';
  document.getElementById('namesExcelArea').style.display  = mode==='excel'?'block':'none';
  document.getElementById('tabManual').className = 'btn btn-sm '+(mode==='manual'?'btn-blue':'btn-gray');
  document.getElementById('tabExcel').className  = 'btn btn-sm '+(mode==='excel'?'btn-blue':'btn-gray');
}
function handleExcelUpload(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
      parsedExcelNames = rows.map(r => String(r[0]||'').trim()).filter(v => v.length>1);
      document.getElementById('excelPreview').innerHTML = `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:13px;color:#16a34a;">✅ נמצאו <strong>${parsedExcelNames.length}</strong> שמות<div style="max-height:80px;overflow-y:auto;margin-top:8px;color:#374151;">${parsedExcelNames.slice(0,5).join(' | ')}${parsedExcelNames.length>5?' ...':''}</div></div>`;
    } catch { document.getElementById('excelPreview').innerHTML='<div style="color:#ef4444;font-size:13px;">שגיאה בקריאת הקובץ</div>'; }
  };
  reader.readAsArrayBuffer(file);
}
async function saveNames() {
  const names = currentNamesMode==='manual'
    ? document.getElementById('namesTextarea').value.split('\n').map(s=>s.trim()).filter(Boolean)
    : parsedExcelNames;
  if (!names.length) { alert('לא הוזנו שמות'); return; }
  const replace = document.getElementById('replaceNames').checked;
  try {
    const res = await POST('/api/names', {userId: currentNamesUserId, names, replace});
    closeModal('modalAddNames');
    alert(`נוספו ${res.added} שמות חדשים`);
    renderAdmin();
  } catch(e) { alert(e.message); }
}

// ===================== USER DETAIL =====================
async function openUserDetail(userId) {
  openModal('modalUserDetail');
  document.getElementById('userDetailTitle').textContent = '📋 טוען...';
  document.getElementById('userDetailContent').innerHTML = loading();
  try {
    const [users, names] = await Promise.all([GET('/api/users'), GET(`/api/names?userId=${userId}`)]);
    const user    = users.find(u=>u.id===userId) || {};
    const today   = new Date().toDateString();
    const coll    = names.filter(n=>n.phone).length;
    const todayC  = names.filter(n=>n.phone&&new Date(n.phoneAddedAt).toDateString()===today).length;
    document.getElementById('userDetailTitle').textContent = `📋 ${user.displayName||userId}`;
    document.getElementById('userDetailContent').innerHTML = `
      <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
        <div class="stat-card" style="flex:1;min-width:90px;"><div class="label">סה"כ</div><div class="value" style="font-size:24px;">${names.length}</div></div>
        <div class="stat-card green" style="flex:1;min-width:90px;"><div class="label">אספו</div><div class="value" style="font-size:24px;">${coll}</div></div>
        <div class="stat-card orange" style="flex:1;min-width:90px;"><div class="label">היום</div><div class="value" style="font-size:24px;">${todayC}</div></div>
        <div class="stat-card red" style="flex:1;min-width:90px;"><div class="label">נשאר</div><div class="value" style="font-size:24px;">${names.length-coll}</div></div>
      </div>
      <div style="max-height:320px;overflow-y:auto;"><table>
        <thead><tr><th>#</th><th>שם</th><th>טלפון</th><th>סטטוס</th></tr></thead>
        <tbody>${names.map((n,i)=>`<tr>
          <td class="row-num">${i+1}</td><td>${n.name}</td>
          <td style="direction:ltr;text-align:right;">${n.phone||'—'}</td>
          <td>${n.phone?'<span class="badge badge-green">✓ הושלם</span>':'<span class="badge badge-gray">ממתין</span>'}</td>
        </tr>`).join('')||'<tr><td colspan="4" style="text-align:center;padding:30px;color:#aaa;">אין שמות</td></tr>'}</tbody>
      </table></div>`;
  } catch(e) { document.getElementById('userDetailContent').innerHTML=`<p style="color:#ef4444;">${e.message}</p>`; }
}

// ===================== USER PROFILE =====================
let profileTab = 'pending', phoneFilter = '', profileNames = [];

async function renderUserProfile(userId) {
  document.getElementById('mainContent').innerHTML = loading();
  try {
    profileNames = await GET(`/api/names?userId=${userId}`);
    renderProfileView(userId);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderProfileView(userId) {
  const user     = currentUser;
  const today    = new Date().toDateString();
  const pending  = profileNames.filter(n=>!n.phone);
  const archived = profileNames.filter(n=> n.phone);
  const todayC   = archived.filter(n=>new Date(n.phoneAddedAt).toDateString()===today).length;
  const pct      = profileNames.length ? Math.round(archived.length/profileNames.length*100) : 0;
  const list     = profileTab==='pending' ? pending : archived;
  const filtered = list.filter(n=>!phoneFilter||n.name.includes(phoneFilter));

  document.getElementById('mainContent').innerHTML = `
    <div style="margin-bottom:20px;">
      <h1 style="font-size:22px;font-weight:800;">${user.displayName||user.username}</h1>
      <div style="font-size:13px;color:#94a3b8;">רשימת שמות לאיסוף טלפונים</div>
    </div>
    <div class="profile-summary">
      <div class="summary-card blue"><div class="num">${todayC}</div><div class="lbl">טלפונים שנאספו היום</div></div>
      <div class="summary-card green">
        <div class="num">${pct}%</div><div class="lbl">הושלמו מכלל הרשימה</div>
        <div style="margin-top:8px;"><div class="progress-bar" style="width:100%;"><div class="progress-fill" style="width:${pct}%"></div></div></div>
      </div>
      <div class="summary-card orange"><div class="num">${pending.length}</div><div class="lbl">עוד חסר לאסוף</div></div>
    </div>
    <div class="tabs" style="margin-bottom:20px;">
      <button class="tab ${profileTab==='pending'?'active':''}" onclick="switchProfileTab('pending','${userId}')">
        ⏳ ממתינים <span style="background:${profileTab==='pending'?'rgba(255,255,255,0.25)':'#e5e7eb'};color:${profileTab==='pending'?'white':'#64748b'};border-radius:99px;padding:1px 8px;font-size:11px;margin-right:6px;">${pending.length}</span>
      </button>
      <button class="tab ${profileTab==='archive'?'active':''}" onclick="switchProfileTab('archive','${userId}')">
        ✅ ארכיון <span style="background:${profileTab==='archive'?'rgba(255,255,255,0.25)':'#e5e7eb'};color:${profileTab==='archive'?'white':'#64748b'};border-radius:99px;padding:1px 8px;font-size:11px;margin-right:6px;">${archived.length}</span>
      </button>
    </div>
    <div class="names-table-wrap">
      <div class="search-bar">
        <input type="text" placeholder="🔍 חיפוש שם..." value="${phoneFilter}" oninput="phoneFilter=this.value;renderProfileView('${userId}')">
        <span style="font-size:13px;color:#94a3b8;">${filtered.length} שמות</span>
      </div>
      ${filtered.length===0
        ? `<div class="empty"><div class="icon">${profileTab==='pending'?'🎉':'📦'}</div><p>${
            profileNames.length===0?'אין שמות ברשימה עדיין':
            profileTab==='pending'?'כל השמות הושלמו! 🎉':'אין עדיין שמות עם טלפון'
          }</p></div>`
        : `<table>
          <thead><tr><th>#</th><th>שם</th><th>מספר טלפון</th>${profileTab==='archive'?'<th>תאריך</th>':''}<th></th></tr></thead>
          <tbody>${filtered.map(n => {
            const orig = profileNames.indexOf(n)+1;
            if (profileTab==='archive') {
              const d = n.phoneAddedAt ? new Date(n.phoneAddedAt).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
              return `<tr style="background:#f0fdf4;">
                <td class="row-num">${orig}</td>
                <td><strong>${n.name}</strong></td>
                <td style="direction:ltr;text-align:right;font-weight:600;color:#16a34a;">${n.phone}</td>
                <td style="font-size:12px;color:#94a3b8;">${d}</td>
                <td><button class="btn btn-sm btn-gray" onclick="clearPhone('${userId}','${n.id}')">↩ החזר</button></td>
              </tr>`;
            }
            return `<tr>
              <td class="row-num">${orig}</td>
              <td><strong>${n.name}</strong></td>
              <td><div class="inline-flex">
                <input type="tel" class="phone-input" id="ph_${n.id}" placeholder="05X-XXXXXXX"
                  onkeydown="if(event.key==='Enter')savePhone('${userId}','${n.id}')">
                <button class="save-btn" onclick="savePhone('${userId}','${n.id}')">שמור</button>
              </div></td>
              <td></td>
            </tr>`;
          }).join('')}</tbody>
        </table>`}
    </div>`;
}

function switchProfileTab(tab, userId) { profileTab=tab; phoneFilter=''; renderProfileView(userId); }

async function savePhone(userId, nameId) {
  const input = document.getElementById('ph_'+nameId);
  const phone = input ? input.value.trim() : '';
  if (!phone) { alert('יש להזין מספר טלפון'); return; }
  try {
    await PUT(`/api/names/${nameId}`, {phone});
    profileNames = await GET(`/api/names?userId=${userId}`);
    renderProfileView(userId);
  } catch(e) { alert(e.message); }
}

async function clearPhone(userId, nameId) {
  try {
    await PUT(`/api/names/${nameId}`, {phone:''});
    profileNames = await GET(`/api/names?userId=${userId}`);
    renderProfileView(userId);
  } catch(e) { alert(e.message); }
}

// ===================== EXCEL EXPORT =====================
async function exportAllExcel() {
  try {
    const rows = await GET('/api/export/all');
    if (!rows.length) { alert('אין טלפונים שנאספו עדיין'); return; }
    const data = [['שם','טלפון','משתמש','תאריך הזנה'],
      ...rows.map(r=>[r.name, r.phone, r.user, r.date?new Date(r.date).toLocaleDateString('he-IL'):'' ])];
    dlExcel(data, 'כל_הטלפונים');
  } catch(e) { alert(e.message); }
}
async function exportUserExcel(userId, displayName) {
  try {
    const rows = await GET(`/api/export/user/${userId}`);
    if (!rows.length) { alert('אין טלפונים שנאספו עבור משתמש זה'); return; }
    const data = [['שם','טלפון','תאריך הזנה'],
      ...rows.map(r=>[r.name, r.phone, r.date?new Date(r.date).toLocaleDateString('he-IL'):'' ])];
    dlExcel(data, `טלפונים_${displayName||userId}`);
  } catch(e) { alert(e.message); }
}
function dlExcel(rows, filename) {
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:16},{wch:18},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'טלפונים');
  XLSX.writeFile(wb, `${filename}_${new Date().toLocaleDateString('he-IL').replace(/\./g,'-')}.xlsx`);
}
async function openExportOptions() {
  const stats = await GET('/api/stats');
  document.getElementById('exportUsersList').innerHTML = stats.map(u=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;">
      <div><strong style="font-size:14px;">${u.displayName}</strong>
        <span style="font-size:12px;color:#94a3b8;margin-right:8px;">${u.collected} טלפונים</span></div>
      <button class="btn btn-sm btn-green" ${!u.collected?'disabled style="opacity:.4;"':''} onclick="exportUserExcel('${u.userId}','${esc(u.displayName)}')">📥 ייצא</button>
    </div>`).join('')||'<div style="text-align:center;color:#aaa;padding:24px;">אין משתמשים</div>';
  openModal('modalExportOptions');
}

// ===================== WHATSAPP =====================
function sendWhatsApp(phone, displayName, pct) {
  const name = displayName.split(' ')[0];
  const msg  = pct>=50
    ? `שלום ${name}! 🌟\nוואו, איזה ביצועים מדהימים!\nהגעת כבר ל-${pct}% מהיעד שלך — זה ממש מרשים! 💪`
    : `שלום ${name}, מה שלומך? 😊\nראיתי שהיום עוד לא הגעת ליעד שלך...\nאתה עומד על ${pct}% בלבד — יש עוד מה להשלים.\nאני בטוח שאתה יכול לסגור את הפער! 💪`;
  const cleaned = phone.replace(/[-\s()]/g,'');
  const intl    = cleaned.startsWith('0') ? '972'+cleaned.slice(1) : cleaned;
  window.open(`https://wa.me/${intl}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ===================== MODALS =====================
function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(m =>
  m.addEventListener('click', e => { if (e.target===m) m.classList.remove('active'); })
);
function esc(s) { return String(s).replace(/'/g,"\\'"); }

  try {
    currentUser = await GET('/api/me');
    showApp();
  } catch {
    document.getElementById('loginPage').style.display = 'flex';
  }
