<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת איסוף טלפונים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

  /* ===== LOGIN ===== */
  #loginPage {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }
  .login-box {
    background: white; border-radius: 16px; padding: 48px 40px;
    width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .login-box h1 { font-size: 26px; margin-bottom: 8px; color: #1a1a2e; }
  .login-box p { color: #888; margin-bottom: 32px; font-size: 14px; }
  .login-box input {
    width: 100%; padding: 13px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 15px; margin-bottom: 16px; direction: rtl; transition: border-color .2s;
    font-family: inherit;
  }
  .login-box input:focus { outline: none; border-color: #0f3460; }
  .btn-primary {
    width: 100%; padding: 13px; background: linear-gradient(135deg, #0f3460, #e94560);
    color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .88; }
  #loginError { color: #e94560; font-size: 13px; margin-top: 12px; }

  /* ===== LAYOUT ===== */
  #app { display: none; min-height: 100vh; }
  .topbar {
    background: #1a1a2e; color: white; padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-title { font-size: 18px; font-weight: 700; }
  .topbar-user { display: flex; align-items: center; gap: 14px; }
  .topbar-user span { font-size: 14px; color: #aaa; }
  .btn-logout {
    background: rgba(255,255,255,0.1); color: white; border: none;
    padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: background .2s;
    font-family: inherit;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }

  .main-content { padding: 32px 28px; max-width: 1200px; margin: 0 auto; }

  /* ===== CARDS ===== */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
  .stat-card {
    background: white; border-radius: 14px; padding: 22px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }
  .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .stat-card .value { font-size: 32px; font-weight: 800; color: #1a1a2e; }
  .stat-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
  .stat-card.green .value { color: #22c55e; }
  .stat-card.orange .value { color: #f59e0b; }
  .stat-card.red .value { color: #ef4444; }
  .stat-card.blue .value { color: #3b82f6; }

  /* ===== SECTION HEADER ===== */
  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .section-header h2 { font-size: 20px; font-weight: 700; }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 9px 18px; border-radius: 9px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 600; transition: opacity .2s; font-family: inherit;
  }
  .btn:hover { opacity: .85; }
  .btn-blue { background: #3b82f6; color: white; }
  .btn-green { background: #22c55e; color: white; }
  .btn-red { background: #ef4444; color: white; }
  .btn-gray { background: #e5e7eb; color: #374151; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ===== TABLE ===== */
  .table-wrap { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8fafc; padding: 14px 18px; text-align: right; font-size: 13px; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
  td { padding: 14px 18px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }

  /* ===== PROGRESS BAR ===== */
  .progress-bar { background: #e5e7eb; border-radius: 99px; height: 8px; width: 120px; overflow: hidden; display: inline-block; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b82f6, #22c55e); transition: width .3s; }

  /* ===== BADGE ===== */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600;
  }
  .badge-green { background: #dcfce7; color: #16a34a; }
  .badge-orange { background: #fef3c7; color: #d97706; }
  .badge-red { background: #fee2e2; color: #dc2626; }
  .badge-gray { background: #f1f5f9; color: #64748b; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 16px; padding: 32px; width: 520px; max-width: 95vw;
    max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  .modal label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; margin-top: 14px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 9px;
    font-size: 14px; direction: rtl; font-family: inherit; transition: border-color .2s;
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: #3b82f6; }
  .modal textarea { resize: vertical; min-height: 100px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* ===== USER PROFILE VIEW ===== */
  .profile-summary {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px;
  }
  .summary-card {
    background: white; border-radius: 14px; padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07); text-align: center;
  }
  .summary-card .num { font-size: 36px; font-weight: 800; }
  .summary-card .lbl { font-size: 13px; color: #888; margin-top: 4px; }
  .summary-card.blue .num { color: #3b82f6; }
  .summary-card.green .num { color: #22c55e; }
  .summary-card.orange .num { color: #f59e0b; }

  .names-table-wrap { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
  .names-table-wrap .search-bar {
    padding: 16px 18px; border-bottom: 1px solid #f1f5f9;
    display: flex; gap: 12px; align-items: center;
  }
  .names-table-wrap .search-bar input {
    flex: 1; padding: 9px 14px; border: 2px solid #e0e0e0; border-radius: 9px;
    font-size: 14px; direction: rtl; font-family: inherit;
  }
  .names-table-wrap .search-bar input:focus { outline: none; border-color: #3b82f6; }

  .phone-input {
    padding: 7px 12px; border: 2px solid #e0e0e0; border-radius: 8px;
    font-size: 13px; width: 160px; font-family: inherit; direction: ltr; text-align: left;
    transition: border-color .2s;
  }
  .phone-input:focus { outline: none; border-color: #3b82f6; }
  .phone-input.saved { border-color: #22c55e; background: #f0fdf4; }

  .save-btn {
    padding: 7px 14px; background: #3b82f6; color: white; border: none;
    border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
    transition: opacity .2s; font-family: inherit;
  }
  .save-btn:hover { opacity: .85; }
  .save-btn.saved { background: #22c55e; }

  /* ===== ADMIN TABS ===== */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: white; padding: 6px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); width: fit-content; }
  .tab {
    padding: 10px 22px; border-radius: 9px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 600; background: transparent; color: #64748b;
    transition: all .2s; font-family: inherit;
  }
  .tab.active { background: #1a1a2e; color: white; }

  /* ===== EMPTY STATE ===== */
  .empty { text-align: center; padding: 60px 20px; color: #aaa; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .profile-summary { grid-template-columns: 1fr 1fr; }
    .main-content { padding: 20px 14px; }
    .topbar { padding: 0 14px; }
    .modal { padding: 24px 18px; }
  }

  .upload-area {
    border: 2px dashed #d1d5db; border-radius: 10px; padding: 28px; text-align: center;
    cursor: pointer; transition: border-color .2s; color: #6b7280; font-size: 14px;
    margin-top: 8px;
  }
  .upload-area:hover { border-color: #3b82f6; color: #3b82f6; }
  .upload-area input { display: none; }

  .row-num { color: #94a3b8; font-size: 12px; }
  .inline-flex { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <div style="font-size:48px;margin-bottom:12px;">📋</div>
    <h1>מערכת איסוף טלפונים</h1>
    <p>התחבר כדי להמשיך</p>
    <input type="text" id="loginUsername" placeholder="שם משתמש" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="סיסמה">
    <button class="btn-primary" onclick="doLogin()">כניסה</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">📋 מערכת איסוף טלפונים</div>
    <div class="topbar-user">
      <span id="topbarUserLabel"></span>
      <button class="btn-logout" onclick="doLogout()">התנתק</button>
    </div>
  </div>
  <div class="main-content" id="mainContent"></div>
</div>

<!-- MODAL ADD USER -->
<div class="modal-overlay" id="modalAddUser">
  <div class="modal">
    <h3>➕ הוסף משתמש חדש</h3>
    <label>שם משתמש</label>
    <input type="text" id="newUsername" placeholder="לדוגמה: yossi123">
    <label>סיסמה</label>
    <input type="password" id="newPassword" placeholder="לפחות 4 תווים">
    <label>שם תצוגה</label>
    <input type="text" id="newDisplayName" placeholder="לדוגמה: יוסי לוי">
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalAddUser')">ביטול</button>
      <button class="btn btn-blue" onclick="saveNewUser()">שמור</button>
    </div>
  </div>
</div>

<!-- MODAL ADD NAMES -->
<div class="modal-overlay" id="modalAddNames">
  <div class="modal">
    <h3>📝 הוסף שמות למשתמש</h3>
    <div id="modalAddNamesUserLabel" style="color:#64748b;font-size:14px;margin-bottom:16px;"></div>

    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn btn-blue btn-sm" onclick="setNamesMode('manual')" id="tabManual">ידני</button>
      <button class="btn btn-gray btn-sm" onclick="setNamesMode('excel')" id="tabExcel">העלאת אקסל</button>
    </div>

    <div id="namesManualArea">
      <label>שמות (שורה אחת לכל שם)</label>
      <textarea id="namesTextarea" placeholder="ישראל ישראלי&#10;שרה כהן&#10;משה לוי"></textarea>
    </div>

    <div id="namesExcelArea" style="display:none;">
      <label>בחר קובץ אקסל (.xlsx / .csv)</label>
      <div class="upload-area" onclick="document.getElementById('excelFileInput').click()">
        <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" onchange="handleExcelUpload(event)">
        <div style="font-size:32px;">📂</div>
        <div style="margin-top:8px;">לחץ לבחירת קובץ</div>
        <div style="font-size:12px;margin-top:4px;color:#9ca3af;">קובץ אקסל עם עמודה של שמות</div>
      </div>
      <div id="excelPreview" style="margin-top:12px;"></div>
    </div>

    <div style="margin-top:12px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal;">
        <input type="checkbox" id="replaceNames" style="width:auto;">
        <span style="font-size:13px;color:#64748b;">החלף את הרשימה הקיימת (ברירת מחדל: הוסף לרשימה)</span>
      </label>
    </div>

    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalAddNames')">ביטול</button>
      <button class="btn btn-green" onclick="saveNames()">שמור שמות</button>
    </div>
  </div>
</div>

<!-- MODAL USER DETAIL (admin view) -->
<div class="modal-overlay" id="modalUserDetail">
  <div class="modal" style="width:700px;">
    <h3 id="userDetailTitle">פרטי משתמש</h3>
    <div id="userDetailContent"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modalUserDetail')">סגור</button>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
function getData(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function setData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function initData() {
  if (!getData('users', null)) {
    setData('users', [
      { id: 'admin', username: 'admin', password: 'admin123', role: 'admin', displayName: 'מנהל ראשי', createdAt: new Date().toISOString() }
    ]);
  }
  if (!getData('namesList', null)) setData('namesList', []);
}

function getUsers() { return getData('users', []); }
function getNames() { return getData('namesList', []); }
function saveUsers(u) { setData('users', u); }
function saveNamesData(n) { setData('namesList', n); }

// ===================== AUTH =====================
let currentUser = null;

function doLogin() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value;
  const users = getUsers();
  const user = users.find(x => x.username === u && x.password === p);
  if (!user) {
    document.getElementById('loginError').textContent = 'שם משתמש או סיסמה שגויים';
    return;
  }
  currentUser = user;
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbarUserLabel').textContent = user.displayName || user.username;
  renderApp();
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').textContent = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') doLogin();
});

// ===================== ROUTER =====================
function renderApp() {
  if (currentUser.role === 'admin') renderAdmin();
  else renderUserProfile(currentUser.id);
}

// ===================== ADMIN =====================
let adminTab = 'overview';

function renderAdmin() {
  const users = getUsers().filter(u => u.role !== 'admin');
  const names = getNames();
  const today = new Date().toDateString();

  // compute stats
  let totalNames = 0, totalPhones = 0, todayPhones = 0;
  users.forEach(u => {
    const uNames = names.filter(n => n.userId === u.id);
    totalNames += uNames.length;
    totalPhones += uNames.filter(n => n.phone).length;
    todayPhones += uNames.filter(n => n.phone && new Date(n.phoneAddedAt).toDateString() === today).length;
  });
  const remaining = totalNames - totalPhones;
  const pct = totalNames ? Math.round(totalPhones / totalNames * 100) : 0;

  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <div class="tabs">
      <button class="tab ${adminTab==='overview'?'active':''}" onclick="switchTab('overview')">סקירה כללית</button>
      <button class="tab ${adminTab==='users'?'active':''}" onclick="switchTab('users')">משתמשים</button>
    </div>

    ${adminTab === 'overview' ? `
    <div class="stat-grid">
      <div class="stat-card blue"><div class="label">סה"כ שמות ברשימות</div><div class="value">${totalNames}</div></div>
      <div class="stat-card green"><div class="label">טלפונים שנאספו</div><div class="value">${totalPhones}</div><div class="sub">${pct}% הושלמו</div></div>
      <div class="stat-card orange"><div class="label">נאספו היום</div><div class="value">${todayPhones}</div></div>
      <div class="stat-card red"><div class="label">עוד נשאר לאסוף</div><div class="value">${remaining}</div></div>
    </div>
    <div class="section-header"><h2>ביצועי משתמשים</h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>משתמש</th><th>שמות ברשימה</th><th>אספו</th><th>היום</th><th>נשאר</th><th>התקדמות</th><th>דירוג</th><th>פעולות</th></tr></thead>
        <tbody>${renderUserRows(users, names, today)}</tbody>
      </table>
    </div>` : `
    <div class="section-header">
      <h2>ניהול משתמשים</h2>
      <button class="btn btn-blue" onclick="openModal('modalAddUser')">➕ הוסף משתמש</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>שם תצוגה</th><th>שם משתמש</th><th>שמות ברשימה</th><th>טלפונים שנאספו</th><th>פעולות</th></tr></thead>
        <tbody>${renderUsersManageRows(users, names)}</tbody>
      </table>
    </div>`}
  `;
}

function renderUserRows(users, names, today) {
  if (!users.length) return '<tr><td colspan="9"><div class="empty"><div class="icon">👥</div><p>אין משתמשים עדיין</p></div></td></tr>';

  const rows = users.map(u => {
    const uNames = names.filter(n => n.userId === u.id);
    const collected = uNames.filter(n => n.phone).length;
    const todayC = uNames.filter(n => n.phone && new Date(n.phoneAddedAt).toDateString() === today).length;
    const remaining = uNames.length - collected;
    const pct = uNames.length ? Math.round(collected / uNames.length * 100) : 0;
    let badge = '';
    if (pct >= 80) badge = '<span class="badge badge-green">חזק 💪</span>';
    else if (pct >= 40) badge = '<span class="badge badge-orange">בינוני</span>';
    else badge = '<span class="badge badge-red">חלש</span>';
    if (!uNames.length) badge = '<span class="badge badge-gray">ללא רשימה</span>';

    return `<tr>
      <td class="row-num">${users.indexOf(u)+1}</td>
      <td><strong>${u.displayName || u.username}</strong><br><span style="color:#94a3b8;font-size:12px;">${u.username}</span></td>
      <td>${uNames.length}</td>
      <td><strong>${collected}</strong></td>
      <td>${todayC}</td>
      <td>${remaining}</td>
      <td>
        <div class="inline-flex">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span style="font-size:12px;color:#64748b;">${pct}%</span>
        </div>
      </td>
      <td>${badge}</td>
      <td>
        <div class="inline-flex">
          <button class="btn btn-sm btn-gray" onclick="openAddNames('${u.id}','${(u.displayName||u.username).replace(/'/g,"\\'")}')">✏️ שמות</button>
          <button class="btn btn-sm btn-blue" onclick="openUserDetail('${u.id}')">👁 פרטים</button>
        </div>
      </td>
    </tr>`;
  });
  return rows.join('');
}

function renderUsersManageRows(users, names) {
  if (!users.length) return '<tr><td colspan="5"><div class="empty"><div class="icon">👥</div><p>אין משתמשים עדיין. לחץ "הוסף משתמש"</p></div></td></tr>';
  return users.map(u => {
    const uNames = names.filter(n => n.userId === u.id);
    const collected = uNames.filter(n => n.phone).length;
    return `<tr>
      <td><strong>${u.displayName || u.username}</strong></td>
      <td style="direction:ltr;text-align:right;">${u.username}</td>
      <td>${uNames.length}</td>
      <td>${collected}</td>
      <td>
        <div class="inline-flex">
          <button class="btn btn-sm btn-gray" onclick="openAddNames('${u.id}','${(u.displayName||u.username).replace(/'/g,"\\'")}')">✏️ ערוך שמות</button>
          <button class="btn btn-sm btn-red" onclick="deleteUser('${u.id}')">🗑 מחק</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function switchTab(tab) {
  adminTab = tab;
  renderAdmin();
}

// ===================== ADD USER =====================
function saveNewUser() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const displayName = document.getElementById('newDisplayName').value.trim();

  if (!username || !password) { alert('יש למלא שם משתמש וסיסמה'); return; }
  if (password.length < 4) { alert('הסיסמה חייבת להכיל לפחות 4 תווים'); return; }

  const users = getUsers();
  if (users.find(u => u.username === username)) { alert('שם משתמש כבר קיים'); return; }

  users.push({ id: 'u_' + Date.now(), username, password, role: 'user', displayName: displayName || username, createdAt: new Date().toISOString() });
  saveUsers(users);
  closeModal('modalAddUser');
  document.getElementById('newUsername').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('newDisplayName').value = '';
  renderAdmin();
}

function deleteUser(uid) {
  if (!confirm('האם למחוק משתמש זה ואת כל הנתונים שלו?')) return;
  const users = getUsers().filter(u => u.id !== uid);
  saveUsers(users);
  const names = getNames().filter(n => n.userId !== uid);
  saveNamesData(names);
  renderAdmin();
}

// ===================== ADD NAMES =====================
let currentNamesUserId = null;
let currentNamesMode = 'manual';
let parsedExcelNames = [];

function openAddNames(userId, displayName) {
  currentNamesUserId = userId;
  document.getElementById('modalAddNamesUserLabel').textContent = `משתמש: ${displayName}`;
  document.getElementById('namesTextarea').value = '';
  document.getElementById('excelPreview').innerHTML = '';
  document.getElementById('replaceNames').checked = false;
  document.getElementById('excelFileInput').value = '';
  parsedExcelNames = [];
  setNamesMode('manual');
  openModal('modalAddNames');
}

function setNamesMode(mode) {
  currentNamesMode = mode;
  document.getElementById('namesManualArea').style.display = mode === 'manual' ? 'block' : 'none';
  document.getElementById('namesExcelArea').style.display = mode === 'excel' ? 'block' : 'none';
  document.getElementById('tabManual').className = 'btn btn-sm ' + (mode === 'manual' ? 'btn-blue' : 'btn-gray');
  document.getElementById('tabExcel').className = 'btn btn-sm ' + (mode === 'excel' ? 'btn-blue' : 'btn-gray');
}

function handleExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const workbook = XLSX.read(e.target.result, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      parsedExcelNames = [];
      rows.forEach(row => {
        const val = String(row[0] || '').trim();
        if (val && val.length > 1) parsedExcelNames.push(val);
      });
      document.getElementById('excelPreview').innerHTML = `
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:13px;color:#16a34a;">
          ✅ נמצאו <strong>${parsedExcelNames.length}</strong> שמות בקובץ
          <div style="max-height:80px;overflow-y:auto;margin-top:8px;color:#374151;">
            ${parsedExcelNames.slice(0, 5).join(' | ')}${parsedExcelNames.length > 5 ? ' ...' : ''}
          </div>
        </div>`;
    } catch (err) {
      document.getElementById('excelPreview').innerHTML = '<div style="color:#ef4444;font-size:13px;">שגיאה בקריאת הקובץ</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

function saveNames() {
  if (!currentNamesUserId) return;
  let newNames = [];

  if (currentNamesMode === 'manual') {
    const raw = document.getElementById('namesTextarea').value;
    newNames = raw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
  } else {
    newNames = parsedExcelNames;
  }

  if (!newNames.length) { alert('לא הוזנו שמות'); return; }

  const replace = document.getElementById('replaceNames').checked;
  let allNames = getNames();

  if (replace) {
    allNames = allNames.filter(n => n.userId !== currentNamesUserId);
  }

  const existing = allNames.filter(n => n.userId === currentNamesUserId).map(n => n.name);
  const toAdd = newNames.filter(n => !existing.includes(n));

  toAdd.forEach(name => {
    allNames.push({ id: 'n_' + Date.now() + '_' + Math.random().toString(36).substr(2,5), userId: currentNamesUserId, name, phone: '', phoneAddedAt: null, createdAt: new Date().toISOString() });
  });

  saveNamesData(allNames);
  closeModal('modalAddNames');
  renderAdmin();
}

// ===================== USER DETAIL (admin) =====================
function openUserDetail(userId) {
  const users = getUsers();
  const user = users.find(u => u.id === userId);
  if (!user) return;
  const names = getNames().filter(n => n.userId === userId);
  const today = new Date().toDateString();
  const collected = names.filter(n => n.phone).length;
  const todayC = names.filter(n => n.phone && new Date(n.phoneAddedAt).toDateString() === today).length;

  document.getElementById('userDetailTitle').textContent = `📋 ${user.displayName || user.username}`;
  document.getElementById('userDetailContent').innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
      <div class="stat-card" style="flex:1;min-width:120px;"><div class="label">סה"כ שמות</div><div class="value" style="font-size:24px;">${names.length}</div></div>
      <div class="stat-card green" style="flex:1;min-width:120px;"><div class="label">אספו</div><div class="value" style="font-size:24px;">${collected}</div></div>
      <div class="stat-card orange" style="flex:1;min-width:120px;"><div class="label">היום</div><div class="value" style="font-size:24px;">${todayC}</div></div>
      <div class="stat-card red" style="flex:1;min-width:120px;"><div class="label">נשאר</div><div class="value" style="font-size:24px;">${names.length - collected}</div></div>
    </div>
    <div style="max-height:320px;overflow-y:auto;">
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="text-align:right;padding:10px;background:#f8fafc;font-size:12px;color:#64748b;border-bottom:1px solid #e2e8f0;">#</th>
          <th style="text-align:right;padding:10px;background:#f8fafc;font-size:12px;color:#64748b;border-bottom:1px solid #e2e8f0;">שם</th>
          <th style="text-align:right;padding:10px;background:#f8fafc;font-size:12px;color:#64748b;border-bottom:1px solid #e2e8f0;">טלפון</th>
          <th style="text-align:right;padding:10px;background:#f8fafc;font-size:12px;color:#64748b;border-bottom:1px solid #e2e8f0;">סטטוס</th>
        </tr></thead>
        <tbody>
          ${names.map((n, i) => `<tr>
            <td style="padding:9px 10px;border-bottom:1px solid #f1f5f9;color:#94a3b8;font-size:12px;">${i+1}</td>
            <td style="padding:9px 10px;border-bottom:1px solid #f1f5f9;font-size:13px;">${n.name}</td>
            <td style="padding:9px 10px;border-bottom:1px solid #f1f5f9;font-size:13px;direction:ltr;text-align:right;">${n.phone || '-'}</td>
            <td style="padding:9px 10px;border-bottom:1px solid #f1f5f9;">
              ${n.phone ? '<span class="badge badge-green">✓ הושלם</span>' : '<span class="badge badge-gray">ממתין</span>'}
            </td>
          </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;padding:30px;color:#aaa;">אין שמות ברשימה</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
  openModal('modalUserDetail');
}

// ===================== USER PROFILE =====================
let phoneFilter = '';

function renderUserProfile(userId) {
  const users = getUsers();
  const user = users.find(u => u.id === userId);
  if (!user) return;
  const names = getNames().filter(n => n.userId === userId);
  const today = new Date().toDateString();
  const collected = names.filter(n => n.phone).length;
  const todayC = names.filter(n => n.phone && new Date(n.phoneAddedAt).toDateString() === today).length;
  const remaining = names.length - collected;
  const pct = names.length ? Math.round(collected / names.length * 100) : 0;

  const filtered = names.filter(n => !phoneFilter || n.name.includes(phoneFilter));

  document.getElementById('mainContent').innerHTML = `
    <div style="margin-bottom:20px;">
      <h1 style="font-size:22px;font-weight:800;">${user.displayName || user.username}</h1>
      <div style="font-size:13px;color:#94a3b8;">רשימת שמות לאיסוף טלפונים</div>
    </div>

    <div class="profile-summary">
      <div class="summary-card blue">
        <div class="num">${todayC}</div>
        <div class="lbl">טלפונים שנאספו היום</div>
      </div>
      <div class="summary-card green">
        <div class="num">${pct}%</div>
        <div class="lbl">הושלמו מכלל הרשימה</div>
        <div style="margin-top:8px;"><div class="progress-bar" style="width:100%;"><div class="progress-fill" style="width:${pct}%"></div></div></div>
      </div>
      <div class="summary-card orange">
        <div class="num">${remaining}</div>
        <div class="lbl">עוד חסר לאסוף</div>
      </div>
    </div>

    <div class="names-table-wrap">
      <div class="search-bar">
        <input type="text" placeholder="🔍 חיפוש שם..." value="${phoneFilter}"
          oninput="phoneFilter=this.value;renderUserProfile('${userId}')">
        <span style="font-size:13px;color:#94a3b8;">${filtered.length} שמות</span>
        <span style="font-size:13px;margin-right:auto;">
          <span class="badge badge-green">${collected} הושלמו</span>
          <span class="badge badge-gray" style="margin-right:6px;">${remaining} ממתינים</span>
        </span>
      </div>
      ${filtered.length === 0 ? `<div class="empty"><div class="icon">📋</div><p>${names.length === 0 ? 'אין שמות ברשימה עדיין. בקש מהמנהל להוסיף שמות.' : 'לא נמצאו תוצאות לחיפוש'}</p></div>` : `
      <table>
        <thead><tr><th>#</th><th>שם</th><th>מספר טלפון</th><th>סטטוס</th></tr></thead>
        <tbody>
          ${filtered.map((n, i) => {
            const originalIdx = names.indexOf(n) + 1;
            return `<tr>
              <td class="row-num">${originalIdx}</td>
              <td><strong>${n.name}</strong></td>
              <td>
                <div class="inline-flex">
                  <input type="tel" class="phone-input ${n.phone ? 'saved' : ''}"
                    id="ph_${n.id}" value="${n.phone || ''}"
                    placeholder="05X-XXXXXXX"
                    onkeydown="if(event.key==='Enter')savePhone('${userId}','${n.id}')">
                  <button class="save-btn ${n.phone ? 'saved' : ''}" onclick="savePhone('${userId}','${n.id}')">
                    ${n.phone ? '✓ עדכן' : 'שמור'}
                  </button>
                </div>
              </td>
              <td>${n.phone ? '<span class="badge badge-green">✓ הושלם</span>' : '<span class="badge badge-gray">ממתין</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

function savePhone(userId, nameId) {
  const input = document.getElementById('ph_' + nameId);
  if (!input) return;
  const phone = input.value.trim();
  const names = getNames();
  const idx = names.findIndex(n => n.id === nameId);
  if (idx === -1) return;
  names[idx].phone = phone;
  names[idx].phoneAddedAt = phone ? new Date().toISOString() : null;
  saveNamesData(names);
  renderUserProfile(userId);
}

// ===================== MODAL HELPERS =====================
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); });
});

// ===================== INIT =====================
initData();
</script>
</body>
</html>
